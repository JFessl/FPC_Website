<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FPC diagram v3 — component to system testing visualization." />
    <title>FPC Diagram v3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: "#0A2540",
              teal: "#00B8A9",
              slate: "#1F2937",
              surface: "#F8F9FA",
            },
            fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
            boxShadow: { card: "0 4px 24px -4px rgba(10, 37, 64, 0.12)" },
          },
        },
      };
    </script>
  </head>
  <body class="bg-surface text-slate antialiased">
    <main class="min-h-dvh px-6 py-10 md:py-14">
      <section class="mx-auto w-full max-w-[1200px]">
        <!-- Diagram v3: three horizontal lanes with compact “chips” -->
        <div class="relative overflow-hidden rounded-3xl border border-slate/10 bg-white p-6 shadow-card sm:p-8">
          <div class="pointer-events-none absolute inset-0 opacity-[0.55]" aria-hidden="true">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(0,184,169,0.18),transparent_55%),radial-gradient(circle_at_bottom,rgba(10,37,64,0.12),transparent_55%)]"></div>
            <div class="absolute inset-0 [background-image:linear-gradient(to_right,rgba(15,23,42,0.06)_1px,transparent_1px),linear-gradient(to_bottom,rgba(15,23,42,0.06)_1px,transparent_1px)] [background-size:40px_40px]"></div>
          </div>

          <div class="relative overflow-hidden rounded-2xl border border-slate/10 bg-white">
            <svg class="pointer-events-none absolute inset-0 hidden h-full w-full lg:block" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <defs>
                <linearGradient id="laneLine" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0" stop-color="#00B8A9" stop-opacity="0.35" />
                  <stop offset="1" stop-color="#0A2540" stop-opacity="0.25" />
                </linearGradient>
                <marker id="laneArrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                  <path d="M0,0 L6,3 L0,6 Z" fill="#00B8A9" fill-opacity="0.75"></path>
                </marker>
              </defs>
              <path d="M55 16 L92 16" stroke="url(#laneLine)" stroke-width="1.15" marker-end="url(#laneArrow)" />
              <path d="M55 50 L92 50" stroke="url(#laneLine)" stroke-width="1.15" marker-end="url(#laneArrow)" />
              <path d="M55 84 L92 84" stroke="url(#laneLine)" stroke-width="1.15" marker-end="url(#laneArrow)" />
            </svg>

            <div class="divide-y divide-slate/10">
              <!-- Lane: system -->
              <section class="p-6 md:p-8" aria-label="System testing lane">
                <div class="grid items-center gap-6 lg:grid-cols-[240px_1fr_340px]">
                  <div>
                    <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-slate/70">System testing</p>
                    <p class="mt-2 text-base font-semibold text-navy">Platforms</p>
                    <p class="mt-1 text-sm text-slate">End-to-end verification.</p>
                  </div>

                  <div class="flex flex-wrap items-center justify-center gap-3 lg:justify-start">
                    <div class="flex items-center gap-3 rounded-full border border-slate/10 bg-white/70 px-4 py-2 backdrop-blur">
                      <img src="assets/visual/system-drone.png" alt="Drone" class="h-10 w-auto object-contain" loading="lazy" decoding="async" />
                      <span class="text-xs font-semibold text-navy">Drone</span>
                    </div>
                    <div class="flex items-center gap-3 rounded-full border border-slate/10 bg-white/70 px-4 py-2 backdrop-blur">
                      <img src="assets/visual/system-satellite.png" alt="Satellite" class="h-10 w-auto object-contain" loading="lazy" decoding="async" />
                      <span class="text-xs font-semibold text-navy">Satellite</span>
                    </div>
                  </div>

                  <div class="flex justify-center lg:justify-end">
                    <div class="rounded-2xl border border-slate/10 bg-white/80 p-3 backdrop-blur">
                      <img src="assets/visual/station-system.png" alt="System test station" class="h-44 w-auto object-contain md:h-52 lg:h-60" loading="lazy" decoding="async" />
                    </div>
                  </div>
                </div>
              </section>

              <!-- Lane: subsystem -->
              <section class="p-6 md:p-8" aria-label="Subsystem testing lane">
                <div class="grid items-center gap-6 lg:grid-cols-[240px_1fr_340px]">
                  <div>
                    <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-slate/70">Subsystem testing</p>
                    <p class="mt-2 text-base font-semibold text-navy">LRUs &amp; modules</p>
                    <p class="mt-1 text-sm text-slate">Interfaces &amp; behavior.</p>
                  </div>

                  <div class="flex flex-wrap items-center justify-center gap-3 lg:justify-start">
                    <div class="rounded-full border border-slate/10 bg-white/70 px-4 py-2 backdrop-blur">
                      <img src="assets/visual/subsystem-box-1.png" alt="Subsystem module" class="h-10 w-auto object-contain" loading="lazy" decoding="async" />
                    </div>
                    <div class="rounded-full border border-slate/10 bg-white/70 px-4 py-2 backdrop-blur">
                      <img src="assets/visual/subsystem-box-2.png" alt="Subsystem module" class="h-10 w-auto object-contain" loading="lazy" decoding="async" />
                    </div>
                    <div class="rounded-full border border-slate/10 bg-white/70 px-4 py-2 backdrop-blur">
                      <img src="assets/visual/subsystem-box-3.png" alt="Subsystem module" class="h-10 w-auto object-contain" loading="lazy" decoding="async" />
                    </div>
                  </div>

                  <div class="flex justify-center lg:justify-end">
                    <div class="rounded-2xl border border-slate/10 bg-white/80 p-3 backdrop-blur">
                      <img src="assets/visual/station-system-alt.png" alt="Subsystem rack" class="h-44 w-auto object-contain md:h-52 lg:h-60" loading="lazy" decoding="async" />
                    </div>
                  </div>
                </div>
              </section>

              <!-- Lane: component -->
              <section class="p-6 md:p-8" aria-label="Component testing lane">
                <div class="grid items-center gap-6 lg:grid-cols-[240px_1fr_340px]">
                  <div>
                    <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-slate/70">Component testing</p>
                    <p class="mt-2 text-base font-semibold text-navy">Parts</p>
                    <p class="mt-1 text-sm text-slate">Repeatable checks.</p>
                  </div>

                  <div class="flex flex-wrap items-end justify-center gap-3 lg:justify-start">
                    <div class="flex items-center gap-3 rounded-full border border-slate/10 bg-white/70 px-4 py-2 backdrop-blur">
                      <img src="assets/visual/component-pcba-1.png" alt="PCBA" class="h-10 w-auto object-contain" loading="lazy" decoding="async" />
                      <span class="text-xs font-semibold text-navy">PCBA</span>
                    </div>
                    <div class="flex items-center gap-3 rounded-full border border-slate/10 bg-white/70 px-4 py-2 backdrop-blur">
                      <img src="assets/visual/component-actuator.png" alt="Actuator" class="h-10 w-auto object-contain" loading="lazy" decoding="async" />
                      <span class="text-xs font-semibold text-navy">Actuators</span>
                    </div>
                    <div class="flex items-center gap-3 rounded-full border border-slate/10 bg-white/70 px-4 py-2 backdrop-blur">
                      <img src="assets/visual/component-sensor.png" alt="Sensor" class="h-10 w-auto object-contain" loading="lazy" decoding="async" />
                      <span class="text-xs font-semibold text-navy">Sensors</span>
                    </div>
                  </div>

                  <div class="flex justify-center lg:justify-end">
                    <div class="rounded-2xl border border-slate/10 bg-white/80 p-3 backdrop-blur">
                      <img src="assets/visual/station-component.png" alt="Component test station" class="h-44 w-auto object-contain md:h-52 lg:h-60" loading="lazy" decoding="async" />
                    </div>
                  </div>
                </div>
              </section>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
