<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FPC — Electrical functional testing for hardware production. funTEST automation software, Matrix Box switching, and turnkey test stations."
    />
    <title>FPC | Electrical Functional Testing for Hardware Production</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: "#0A2540",
              teal: "#00B8A9",
              slate: "#1F2937",
              surface: "#F8F9FA",
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
            },
            maxWidth: {
              content: "1280px",
            },
            boxShadow: {
              card: "0 4px 24px -4px rgba(10, 37, 64, 0.12)",
              "card-hover": "0 12px 40px -8px rgba(10, 37, 64, 0.18)",
            },
          },
        },
      };
    </script>
    <style>
      .skip-link {
        position: absolute;
        left: -9999px;
        top: 0;
        z-index: 100;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        background: #fff;
        color: #0a2540;
        font-weight: 600;
        box-shadow: 0 10px 25px rgba(10, 37, 64, 0.15);
      }
      .skip-link:focus {
        left: 1rem;
        top: 1rem;
        outline: 2px solid #00b8a9;
        outline-offset: 2px;
      }
      .reveal {
        opacity: 0;
        transform: translateY(1.25rem);
        transition: opacity 0.6s ease, transform 0.6s ease;
      }
      .reveal.is-visible {
        opacity: 1;
        transform: translateY(0);
      }
      .tag-pill {
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body class="bg-surface text-slate antialiased">
    <main class="min-h-dvh px-6 py-10 md:py-14">
      <section class="mx-auto w-full max-w-[1100px]">
        <!-- Diagram only (v1) -->
        <figure>
          <figcaption class="sr-only">
            Visual map of testing coverage from components to subsystems to full systems.
          </figcaption>

          <div class="relative overflow-hidden rounded-3xl border border-slate/10 bg-white p-6 shadow-card sm:p-8">
            <div class="pointer-events-none absolute inset-0 opacity-[0.55]" aria-hidden="true">
              <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(0,184,169,0.18),transparent_55%),radial-gradient(circle_at_bottom,rgba(10,37,64,0.12),transparent_55%)]"></div>
              <div class="absolute inset-0 [background-image:linear-gradient(to_right,rgba(15,23,42,0.06)_1px,transparent_1px),linear-gradient(to_bottom,rgba(15,23,42,0.06)_1px,transparent_1px)] [background-size:40px_40px]"></div>
            </div>

            <div class="relative overflow-hidden rounded-2xl border border-slate/10 bg-white">
              <svg class="pointer-events-none absolute inset-0 hidden h-full w-full lg:block" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                <defs>
                  <linearGradient id="vizLine" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0" stop-color="#00B8A9" stop-opacity="0.35" />
                    <stop offset="1" stop-color="#0A2540" stop-opacity="0.25" />
                  </linearGradient>
                  <marker id="vizArrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                    <path d="M0,0 L6,3 L0,6 Z" fill="#00B8A9" fill-opacity="0.75"></path>
                  </marker>
                </defs>
                <path d="M63 17 L92 17" stroke="url(#vizLine)" stroke-width="1.25" marker-end="url(#vizArrow)" />
                <path d="M63 50 L92 50" stroke="url(#vizLine)" stroke-width="1.25" marker-end="url(#vizArrow)" />
                <path d="M63 83 L92 83" stroke="url(#vizLine)" stroke-width="1.25" marker-end="url(#vizArrow)" />
              </svg>

              <!-- System level -->
              <section class="relative p-6 md:p-8" aria-label="System level testing">
                <div class="grid gap-4 md:grid-cols-[180px_1fr] md:items-center">
                  <div>
                    <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-slate/70">System testing</p>
                    <p class="mt-2 text-sm font-semibold text-navy">End-to-end platforms</p>
                    <p class="mt-1 text-sm text-slate">Integrated behavior, mission flows, and traceability.</p>
                  </div>
                  <div class="grid items-center gap-6 md:grid-cols-[1fr_280px] lg:grid-cols-[1fr_340px]">
                    <div class="flex flex-wrap items-center justify-center gap-4 md:justify-start">
                      <div class="flex items-center gap-4 rounded-2xl border border-slate/10 bg-white/70 px-4 py-3 backdrop-blur">
                        <img src="assets/visual/system-drone.png" alt="Drone platform" class="h-16 w-auto object-contain" loading="lazy" decoding="async" />
                        <span class="hidden text-xs font-semibold text-slate/80 md:block">Drone</span>
                      </div>
                      <div class="flex items-center gap-4 rounded-2xl border border-slate/10 bg-white/70 px-4 py-3 backdrop-blur">
                        <img src="assets/visual/system-satellite.png" alt="Satellite platform" class="h-16 w-auto object-contain" loading="lazy" decoding="async" />
                        <span class="hidden text-xs font-semibold text-slate/80 md:block">Satellite</span>
                      </div>
                    </div>
                    <div class="flex justify-center md:justify-end">
                      <div class="rounded-2xl border border-slate/10 bg-white/80 p-3 backdrop-blur">
                        <img src="assets/visual/station-system.png" alt="System test station" class="h-44 w-auto object-contain md:h-52 lg:h-60" loading="lazy" decoding="async" />
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              <div class="mx-6 border-t border-slate/10 md:mx-8" aria-hidden="true"></div>

              <!-- Subsystem level -->
              <section class="relative p-6 md:p-8" aria-label="Subsystem testing">
                <div class="grid gap-4 md:grid-cols-[180px_1fr] md:items-center">
                  <div>
                    <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-slate/70">Subsystem testing</p>
                    <p class="mt-2 text-sm font-semibold text-navy">Modules &amp; LRUs</p>
                    <p class="mt-1 text-sm text-slate">Interfaces, timing, and fault behavior before integration.</p>
                  </div>
                  <div class="grid items-center gap-6 md:grid-cols-[1fr_280px] lg:grid-cols-[1fr_340px]">
                    <div class="flex flex-wrap items-center justify-center gap-3 md:justify-start">
                      <div class="rounded-2xl border border-slate/10 bg-white/70 px-4 py-3 backdrop-blur">
                        <img src="assets/visual/subsystem-box-1.png" alt="Subsystem module" class="h-14 w-auto object-contain md:h-16" loading="lazy" decoding="async" />
                      </div>
                      <div class="rounded-2xl border border-slate/10 bg-white/70 px-4 py-3 backdrop-blur">
                        <img src="assets/visual/subsystem-box-2.png" alt="Subsystem module" class="h-14 w-auto object-contain md:h-16" loading="lazy" decoding="async" />
                      </div>
                      <div class="rounded-2xl border border-slate/10 bg-white/70 px-4 py-3 backdrop-blur">
                        <img src="assets/visual/subsystem-box-3.png" alt="Subsystem module" class="h-14 w-auto object-contain md:h-16" loading="lazy" decoding="async" />
                      </div>
                    </div>
                    <div class="flex justify-center md:justify-end">
                      <div class="rounded-2xl border border-slate/10 bg-white/80 p-3 backdrop-blur">
                        <img src="assets/visual/station-system-alt.png" alt="Subsystem test rack" class="h-44 w-auto object-contain md:h-52 lg:h-60" loading="lazy" decoding="async" />
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              <div class="mx-6 border-t border-slate/10 md:mx-8" aria-hidden="true"></div>

              <!-- Component level -->
              <section class="relative p-6 md:p-8" aria-label="Component testing">
                <div class="grid gap-4 md:grid-cols-[180px_1fr] md:items-center">
                  <div>
                    <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-slate/70">Component testing</p>
                    <p class="mt-2 text-sm font-semibold text-navy">PCBAs, sensors, actuators</p>
                    <p class="mt-1 text-sm text-slate">Repeatable checks before upstream integration.</p>
                  </div>
                  <div class="grid items-center gap-6 md:grid-cols-[1fr_280px] lg:grid-cols-[1fr_340px]">
                    <div class="flex flex-wrap items-end justify-center gap-3 md:justify-start">
                      <div class="rounded-2xl border border-slate/10 bg-white/70 px-4 py-3 text-center backdrop-blur md:text-left">
                        <img src="assets/visual/component-pcba-1.png" alt="PCBA" class="mx-auto h-14 w-auto object-contain md:mx-0 md:h-16" loading="lazy" decoding="async" />
                        <p class="mt-2 text-xs font-semibold text-navy">PCBA</p>
                      </div>
                      <div class="rounded-2xl border border-slate/10 bg-white/70 px-4 py-3 text-center backdrop-blur md:text-left">
                        <img src="assets/visual/component-actuator.png" alt="Actuator" class="mx-auto h-14 w-auto object-contain md:mx-0 md:h-16" loading="lazy" decoding="async" />
                        <p class="mt-2 text-xs font-semibold text-navy">Actuators</p>
                      </div>
                      <div class="rounded-2xl border border-slate/10 bg-white/70 px-4 py-3 text-center backdrop-blur md:text-left">
                        <img src="assets/visual/component-sensor.png" alt="Sensor" class="mx-auto h-14 w-auto object-contain md:mx-0 md:h-16" loading="lazy" decoding="async" />
                        <p class="mt-2 text-xs font-semibold text-navy">Sensors</p>
                      </div>
                    </div>
                    <div class="flex justify-center md:justify-end">
                      <div class="rounded-2xl border border-slate/10 bg-white/80 p-3 backdrop-blur">
                        <img src="assets/visual/station-component.png" alt="Component test station" class="h-44 w-auto object-contain md:h-52 lg:h-60" loading="lazy" decoding="async" />
                      </div>
                    </div>
                  </div>
                </div>
              </section>
            </div>
          </div>
        </figure>
      </section>
    </main>
  </body>
</html>
